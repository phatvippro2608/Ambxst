


source=~/.local/share/ambxst/hyprland.conf
monitor=,preferred,auto,1

env = XDG_MENU_PREFIX,arch-

$mainMod = SUPER
$fileManager = dolphin

input {
    sensitivity = 1.0 
    accel_profile = flat 
    touchpad {
         natural_scroll = true
    }
}

bind = $mainMod SHIFT, S, exec, bash -c 'FILE=~/Pictures/Screenshots/Screenshot_$(date +"%Y-%m-%d_%H%M%S").png && grim -g "$(slurp)" "$FILE" && wl-copy < "$FILE" && notify-send "Chụp màn hình" "Đã lưu vùng chọn"'
bind = , Print, exec, bash -c 'FILE=~/Pictures/Screenshots/Screenshot_$(date +"%Y-%m-%d_%H%M%S").png && grim -g "$(slurp)"  "$FILE" && wl-copy < "$FILE" && notify-send "Chụp màn hình" "Đã lưu toàn màn hình và copy vào Clipboard"'

bind = $mainMod, E, exec, $fileManager
bind = $mainMod, up, fullscreen, 1
bind = $mainMod, down, togglefloating


exec-once = hypridle

exec-once = gnome-keyring-daemon --start --components=pkcs11,secrets,ssh
#windowrule = float 1, match:class ^(google-chrome)$
#windowrule = float 1, match:class ^(.*)$
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Clipboard Manager Rules & Hotkeys
windowrule = float 1, match:class ^(clipboard)$
windowrule = size 400 600, match:class ^(clipboard)$
windowrule = center 1, match:class ^(clipboard)$
windowrule = pin 1, match:class ^(clipboard)$
#windowrule = stayfocused true, match:class ^(clipboard)$
bind = $mainMod SHIFT, V, exec, clipboard

# File / Folder Picker Rules
windowrule = float 1, match:class ^([Xx]dg-desktop-portal-gtk)$
windowrule = size 900 650, match:class ^([Xx]dg-desktop-portal-gtk)$
windowrule = center 1, match:class ^([Xx]dg-desktop-portal-gtk)$


exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# exec-once = wl-clip-persist --clipboard regular


exec-once = sleep 2 && fcitx5 -d --replace
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx

env = SDL_IM_MODULE,fcitx
env = GLFW_IM_MODULE,fcitx

# === Ergonomic & Infinite Workspace Navigation ===
# 1. Chuyển Workspace bằng con lăn chuột + Super (Tay phải giữ chuột kéo file siêu thoải mái):
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod SHIFT, mouse_down, movetoworkspace, e+1
bind = $mainMod SHIFT, mouse_up, movetoworkspace, e-1

# 2. Overview / Mission Control (Giao diện tổng quan tất cả cửa sổ như Ubuntu / macOS):
# Ấn Super + Tab hoặc Super + Alt + Tab để mở giao diện Overview tổng quan:
bind = $mainMod, Tab, exec, echo "overview" > /tmp/ambxst_ipc.pipe
bind = $mainMod ALT, Tab, exec, echo "overview" > /tmp/ambxst_ipc.pipe
bind = $mainMod, GRAVE, workspace, previous

# 3. Phím chuyển Workspace theo hướng mũi tên:
bind = $mainMod, Right, workspace, e+1
bind = $mainMod, Left, workspace, e-1
bind = $mainMod SHIFT, Right, movetoworkspace, e+1
bind = $mainMod SHIFT, Left, movetoworkspace, e-1

# 4. Hỗ trợ Workspace 11 -> 15 (Super + ALT + 1..5):
bind = $mainMod ALT, 1, workspace, 11
bind = $mainMod ALT, 2, workspace, 12
bind = $mainMod ALT, 3, workspace, 13
bind = $mainMod ALT, 4, workspace, 14
bind = $mainMod ALT, 5, workspace, 15
bind = $mainMod ALT SHIFT, 1, movetoworkspace, 11
bind = $mainMod ALT SHIFT, 2, movetoworkspace, 12
bind = $mainMod ALT SHIFT, 3, movetoworkspace, 13
bind = $mainMod ALT SHIFT, 4, movetoworkspace, 14
bind = $mainMod ALT SHIFT, 5, movetoworkspace, 15


